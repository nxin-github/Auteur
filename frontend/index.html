<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auteur · AI 剧组流水线</title>
    <meta name="description" content="一个由 16 位 AI 角色组成的剧组,端到端自动化生产中文短视频。多角色协作、自动剪辑、数据回写复盘。" />
    <!-- 社交分享卡片(被分享到微信/Twitter/Slack 时显示)-->
    <meta property="og:title" content="Auteur · 16 位 AI 角色组成的剧组流水线" />
    <meta property="og:description" content="一句话发起 → 选题、编剧、分镜、生图、配音、配乐、剪辑、复盘 全部跑完 → 落地 MP4" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <!--
      GitHub Pages SPA fallback 路径还原 —— 配合 public/404.html 使用。
      访问 /Auteur/scripts/12 → GitHub Pages 404 → 404.html 把它编成 /Auteur/?/scripts/12 回来 →
      这段脚本把 ?/scripts/12 还原成 /scripts/12 推回 history,vue-router 接管。
      Vercel / 本地 / Docker 部署不会触发这条路径(那里 SPA fallback 已经走 vercel.json 或 nginx),
      所以这段脚本永远是 no-op。
    -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
