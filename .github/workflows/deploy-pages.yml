name: Deploy to GitHub Pages

# 在 push main 时自动构建 demo 站并发布到 GitHub Pages,
# URL 是 https://nxin-github.github.io/Auteur/
#
# 这跟 Vercel 部署是两套并存的:
#   - Vercel: auteur-phi.vercel.app(海外节点,国内访问慢)
#   - GitHub Pages: nxin-github.github.io/Auteur/(国内勉强能开,免备案)

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动从 Actions 页面触发重新部署

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻最多一个 deploy 在跑(防多次 push 触发的 race)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build with demo mode + GitHub Pages base path
        working-directory: frontend
        env:
          # vite.config.ts 读这俩,demo interceptor 启用 + 资源路径加 /Auteur/ 前缀
          VITE_DEMO_MODE: force
          VITE_BASE_PATH: /Auteur/
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Publish to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
